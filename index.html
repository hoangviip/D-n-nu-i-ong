<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bee War Tycoon v1.4.2</title>
    <style>
        :root {
            --h-main: #f39c12; --h-light: #f1c40f; --h-dark: #d35400;
            --bg: #2c1e0a; --card: #4a2f0f;
        }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .game-container { width: 100%; max-width: 450px; background: var(--card); border-radius: 15px; padding: 15px; border: 2px solid var(--h-main); box-shadow: 0 0 20px #000; }
        #event-log { background: #1a1005; padding: 8px; border-radius: 8px; margin: 10px 0; font-size: 0.8rem; color: var(--h-light); height: 60px; overflow-y: auto; border: 1px solid #640; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #530; }
        .val { color: var(--h-light); font-weight: bold; font-size: 1.1rem; display: block; }
        .bee-info { font-size: 0.8rem; background: #321; padding: 8px; border-radius: 8px; margin-bottom: 10px; line-height: 1.4; }
        
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 1rem; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; filter: grayscale(1); }

        .btn-honey { background: linear-gradient(var(--h-light), var(--h-main)); color: #310; position: relative; overflow: hidden; }
        .btn-sell { background: #2ecc71; }
        .btn-random { background: #3498db; }
        .btn-dragon { background: #9b59b6; }
        .btn-war { background: #e67e22; }
        .btn-pvp { background: #e74c3c; }
        
        .cd-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: rgba(0,0,0,0.5); width: 0%; }
        .inv-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; margin: 10px 0; font-size: 0.8rem; border: 1px dashed var(--h-main); }
        .item { display: inline-block; background: #530; padding: 4px 8px; margin: 2px; border-radius: 4px; border: 1px solid #850; }
    </style>
</head>
<body>

<div class="game-container">
    <div style="text-align:center; color:var(--h-light); font-weight:bold;">🍯 BEE WAR v1.4.2</div>
    
    <div id="event-log">Hệ thống: Chào mừng! Nhập code "denbu" ngay.</div>

    <div id="human-alert" style="display:none; background:#c0392b; padding:10px; border-radius:10px; text-align:center; margin-bottom:10px; border:2px solid white;">
        <strong>CẢNH BÁO: TRỘM MẬT!</strong><br>
        <button style="background:white; color:red; padding:8px; margin-top:5px;" onclick="fightHuman()">PHẢN CÔNG (4s)</button>
    </div>

    <div class="stats-grid">
        <div class="stat-box">Mật: <span id="honey" class="val">0</span></div>
        <div class="stat-box">Tiền: <span id="money" class="val">0</span></div>
    </div>

    <div class="bee-info" id="beeList">Thợ: 0 | Chiến: 0 | Chúa: 0 | Bully: 0 | 🐉 RỒNG: 0</div>

    <div class="inv-box" id="invDisplay" style="display:none">
        <strong>Túi đồ (Buff thắng: +<span id="bonusTxt">0</span>%)</strong><br>
        <div id="items-list"></div>
    </div>

    <button class="btn-honey" id="btn-collect" onclick="collectHoney()">ĐI LẤY MẬT (3s) <div class="cd-bar" id="bar"></div></button>
    <button class="btn-sell" onclick="sellHoney()">BÁN MẬT (-30% Lạm phát)</button>
    
    <div style="display:flex; gap:5px;">
        <button class="btn-war" id="btn-invade" onclick="invade()">XÂM CHIẾM</button>
        <button style="background:#27ae60" id="btn-adv" onclick="adventure()">CƯỠI RỒNG (10s)</button>
    </div>

    <button class="btn-dragon" id="btn-evo" onclick="evolve()">TIẾN HÓA RỒNG (5s - Cần 2 Chúa)</button>
    <button class="btn-pvp" id="btn-pvp" onclick="pvp()">ĐẤU TRƯỜNG SOLO (Cần 3 Chúa)</button>

    <div style="text-align:center; margin:10px 0; font-weight:bold; color:var(--h-light);" id="roll-res">Sẵn sàng quay ong...</div>
    <button class="btn-random" id="btn-roll" onclick="roll()">RANDOM ONG (<span id="cost">1000</span>$)</button>

    <div style="display:flex; gap:5px; margin-top:10px;">
        <input type="text" id="codeIn" placeholder="Nhập mã..." style="flex:1; padding:10px; border-radius:8px; border:1px solid #640; background:#1a1005; color:white;">
        <button style="width:80px; background:var(--h-dark); margin:0;" onclick="checkCode()">OK</button>
    </div>

    <div style="display:flex; gap:5px; margin-top:15px;">
        <button style="background:#555; font-size:0.7rem;" onclick="save()">💾 LƯU</button>
        <button style="background:#555; font-size:0.7rem;" onclick="fix()">🛠 SỬA LỖI</button>
        <button style="background:#a93226; font-size:0.7rem;" onclick="clearAll()">🗑 XÓA</button>
    </div>
</div>

<script>
    // Khởi tạo dữ liệu kiểu cũ để tương thích máy yếu
    var game = {
        honey: 0, money: 0, cost: 1000,
        worker: 0, fighter: 0, queen: 0, bully: 0, dragon: 0,
        stone: 0, lemon: 0, bran: 0, cake: 0,
        bonus: 0, fails: 0, busy: false, attacking: false
    };

    function log(m) {
        var e = document.getElementById('event-log');
        e.innerHTML = "> " + m + "<br>" + e.innerHTML;
    }

    function update() {
        document.getElementById('honey').innerText = Math.floor(game.honey);
        document.getElementById('money').innerText = Math.floor(game.money);
        document.getElementById('cost').innerText = Math.floor(game.cost);
        document.getElementById('beeList').innerText = "Thợ: "+game.worker+" | Chiến: "+game.fighter+" | Chúa: "+game.queen+" | Bully: "+game.bully+" | 🐉 RỒNG: "+game.dragon;
        
        // Cập nhật túi đồ
        var hasItem = (game.stone + game.lemon + game.bran + game.cake) > 0;
        document.getElementById('invDisplay').style.display = (hasItem || game.bonus > 0) ? "block" : "none";
        document.getElementById('bonusTxt').innerText = game.bonus;
        
        var itHtml = "";
        if(game.stone > 0) itHtml += '<div class="item" onclick="use(\'stone\')">Cát đá ('+game.stone+')</div>';
        if(game.lemon > 0) itHtml += '<div class="item" onclick="use(\'lemon\')">Chanh ('+game.lemon+')</div>';
        if(game.bran > 0) itHtml += '<div class="item" onclick="use(\'bran\')">Cám ('+game.bran+')</div>';
        if(game.cake > 0) itHtml += '<div class="item" onclick="use(\'cake\')">Bánh ('+game.cake+')</div>';
        document.getElementById('items-list').innerHTML = itHtml;

        // Hiện nút theo điều kiện
        document.getElementById('btn-invade').style.display = game.fighter >= 2 ? "block" : "none";
        document.getElementById('btn-adv').style.display = game.dragon >= 1 ? "block" : "none";
        document.getElementById('btn-evo').style.display = game.queen >= 2 ? "block" : "none";
        document.getElementById('btn-pvp').style.display = game.queen >= 3 ? "block" : "none";
        document.getElementById('human-alert').style.display = game.attacking ? "block" : "none";

        // Khóa nút khi đang bận
        var b = game.busy;
        document.getElementById('btn-collect').disabled = b;
        document.getElementById('btn-roll').disabled = b || game.money < game.cost;
    }

    function collectHoney() {
        if(game.busy) return;
        game.busy = true; update();
        var bar = document.getElementById('bar');
        bar.style.width = "0%";
        setTimeout(function(){ bar.style.transition = "width 3s linear"; bar.style.width = "100%"; }, 50);

        setTimeout(function(){
            var get = 10 + (game.worker * 3);
            game.honey += get;
            game.busy = false; bar.style.transition = "none"; bar.style.width = "0%";
            log("Nhận được " + get + " mật ong.");
            update();
        }, 3050);
    }

    function sellHoney() {
        var m = (game.honey * 0.5) * 0.7;
        game.money += m; game.honey = 0;
        log("Bán mật nhận được " + Math.floor(m) + "$");
        update();
    }

    function roll() {
        if(game.money < game.cost || game.busy) return;
        game.money -= game.cost; game.cost *= 1.4;
        game.busy = true; update();
        document.getElementById('roll-res').innerText = "Đang quay...";

        setTimeout(function(){
            var r = Math.random() * 100;
            var name = "";
            if(r < 57) { game.worker++; name="Ong Thợ"; }
            else if(r < 77) { game.fighter++; name="Ong Chiến"; }
            else if(r < 90) { game.queen++; name="Ong Chúa"; }
            else { game.bully++; name="Ong Bully"; }
            
            document.getElementById('roll-res').innerText = "Chúc mừng: " + name;
            log("Vừa nhận 1 " + name);
            game.busy = false; update();
        }, 800);
    }

    function evolve() {
        if(game.queen < 2 || game.busy) return;
        game.busy = true; log("🔮 Đang tiến hóa... (5s)"); update();
        setTimeout(function(){
            game.busy = false;
            if(Math.random() < 0.15) {
                game.queen -= 2; game.dragon++; game.fails = 0;
                log("🎉 THÀNH CÔNG! Đã có Rồng Ong.");
            } else {
                game.fails++; log("❌ Hụt rồi! (Lỗi tích lũy: "+game.fails+"/3)");
                if(game.fails >= 3) {
                    game.fails = 0;
                    if(game.dragon > 0) { game.dragon--; log("💀 Phản phệ! Bạn mất 1 Rồng."); }
                }
            }
            update();
        }, 5000);
    }

    function adventure() {
        if(game.dragon < 1 || game.busy) return;
        game.busy = true; log("🐉 Rồng đang bay đi... (10s)"); update();
        setTimeout(function(){
            game.busy = false;
            var r = Math.random();
            if(r < 0.2) log("Rồng không tìm thấy gì.");
            else if(r < 0.5) { game.stone++; log("Nhặt được Cát đá (+1% thắng)"); }
            else if(r < 0.75) { game.lemon++; log("Nhặt được Chanh (+2% thắng)"); }
            else if(r < 0.9) { game.bran++; log("Nhặt được Cám (+3% thắng)"); }
            else { game.cake++; log("Nhặt được Bánh (+5% thắng)"); }
            update();
        }, 10000);
    }

    function use(t) {
        if(game[t] > 0) {
            game[t]--;
            var b = {stone:1, lemon:2, bran:3, cake:5};
            game.bonus += b[t];
            log("Đã sử dụng vật phẩm buff!"); update();
        }
    }

    function invade() {
        if(game.fighter < 2 || game.busy) return;
        game.busy = true; log("⚔️ Đang tấn công tổ khác..."); update();
        setTimeout(function(){
            game.busy = false;
            var rate = (40 + game.bonus + (game.dragon * 10)) / 100;
            if(Math.random() < rate) {
                var win = 3000 + (game.fighter * 500); game.money += win;
                log("THẮNG! Cướp được " + win + "$");
            } else {
                game.fighter--; log("THUA! Mất 1 Ong Chiến.");
            }
            game.bonus = 0; update();
        }, 3000);
    }

    function pvp() {
        game.busy = true; log("🌐 Đang tìm đối thủ..."); update();
        setTimeout(function(){
            var myP = game.worker + (game.fighter*5) + (game.queen*20) + (game.dragon*100);
            var enP = myP * (Math.random() + 0.5);
            log("Solo! Lực chiến Bạn: "+myP+" - Địch: "+Math.floor(enP));
            setTimeout(function(){
                game.busy = false;
                if(myP > enP) { game.money += 10000; log("CHIẾN THẮNG PVP! +10k$"); }
                else { game.honey = 0; log("THUA PVP! Mất sạch mật ong."); }
                update();
            }, 2000);
        }, 1500);
    }

    function fightHuman() {
        var t = 4;
        var cd = setInterval(function(){
            t--;
            if(t <= 0) {
                clearInterval(cd);
                if(Math.random() < 0.4 || game.dragon > 0) {
                    game.attacking = false; game.money += 1000;
                    log("Đã đuổi được người!");
                } else log("Người quá mạnh, trộm vẫn đang phá!");
                update();
            }
        }, 1000);
    }

    function checkCode() {
        var c = document.getElementById('codeIn').value.toLowerCase();
        if(c === "denbu") {
            game.worker += 2; game.fighter += 2; game.queen += 2; game.bully += 2;
            log("Đã nhận đền bù: +2 mỗi loại ong!");
        } else if(c === "bii") {
            game.queen += 1; game.fighter += 5; log("Code bii: +1 Chúa, +5 Chiến.");
        }
        document.getElementById('codeIn').value = ""; update();
    }

    // Tự sản xuất mật
    setInterval(function(){
        if(!game.attacking || game.queen > 0) {
            game.honey += (game.worker*0.5 + game.queen*4 + game.bully*2 + game.dragon*30) * 0.7;
        }
        if(game.attacking) game.honey = Math.max(0, game.honey - 10);
        
        if(!game.attacking && game.worker > 5 && Math.random() < 0.02) {
            game.attacking = true; log("🚨 TRỘM XUẤT HIỆN!");
        }
        update();
    }, 1000);

    function save() { localStorage.setItem("bee_v14", JSON.stringify(game)); alert("Đã lưu!"); }
    function fix() { game.busy = false; update(); log("Đã sửa kẹt nút!"); }
    function clearAll() { if(confirm("Xóa hết chơi lại?")) { localStorage.clear(); location.reload(); } }

    window.onload = function() {
        var s = localStorage.getItem("bee_v14") || localStorage.getItem("bee_war_v14") || localStorage.getItem("bee_war_v13");
        if(s) {
            var data = JSON.parse(s);
            // Đồng bộ dữ liệu cũ sang mới
            for(var key in data) { game[key] = data[key]; }
            log("Tải dữ liệu thành công!");
        }
        update();
    }
</script>
</body>
    </html>
