<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bee War Tycoon v1.1</title>
    <style>
        :root {
            --primary: #f1c40f;
            --dark: #1a1a1a;
            --card: #2c2c2c;
            --accent: #e67e22;
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--dark); 
            color: white; 
            margin: 0; 
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .game-container { 
            width: 100%; 
            max-width: 450px; 
            background: var(--card); 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        /* Update Tag */
        .version-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: #777;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .header h2 { color: var(--primary); margin: 10px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            background: rgba(0,0,0,0.2); 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 20px;
        }

        .stat-item { font-size: 0.85rem; color: #bbb; }
        .stat-value { font-size: 1.2rem; color: var(--primary); font-weight: bold; display: block; }

        /* Battle Zone */
        #battle-zone { 
            display: none; 
            background: linear-gradient(45deg, #c0392b, #e74c3c); 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            text-align: center;
            border: 2px solid rgba(255,255,255,0.3);
        }

        /* Buttons */
        button { 
            width: 100%; 
            padding: 16px; 
            margin: 8px 0; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        button:active { transform: translateY(2px); box-shadow: none; }
        button:disabled { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }

        .btn-collect { background: var(--primary); color: #333; position: relative; overflow: hidden; }
        .btn-sell { background: var(--success); color: white; }
        .btn-random { background: var(--accent); color: white; }
        .btn-attack { background: white; color: var(--danger); }

        /* Cooldown bar */
        .cooldown-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: rgba(0,0,0,0.3);
            width: 0%;
        }

        /* Random Effect */
        #random-display {
            height: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #555;
            border-radius: 10px;
        }

        .spinning { animation: spin 0.1s infinite linear; }
        @keyframes spin { 
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        .code-section { margin-top: 20px; display: flex; gap: 5px; }
        .code-section input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #444; color: white; }
        .btn-code { width: auto; padding: 12px 20px; margin: 0; }

        .bee-list { font-size: 0.8rem; text-align: left; margin: 10px 0; color: #aaa; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="version-tag">Update 1.1 (v1.0 qua rồi)</div>
    
    <div class="header" style="text-align: center;">
        <h2>🐝 BEE WAR v1.1</h2>
    </div>

    <div id="battle-zone">
        <div id="battle-msg" style="font-weight:bold; margin-bottom:10px;">⚠️ CON NGƯỜI ĐANG TRỘM MẬT!</div>
        <button class="btn-attack" id="attackBtn" onclick="fightHuman()">PHẢN CÔNG (30% thắng)</button>
        <div id="battle-timer" style="font-size: 0.9rem; margin-top: 5px;"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-item">Mật ong<span id="honey" class="stat-value">0</span></div>
        <div class="stat-item">Tiền vàng<span id="money" class="stat-value">0</span></div>
        <div class="stat-item">Tổng số ong<span id="totalBees" class="stat-value">0</span></div>
        <div class="stat-item">Sản lượng/s<span id="hps" class="stat-value">0</span></div>
    </div>

    <div class="bee-list" id="beeDetails">
        Thợ: 0 | Chiến: 0 | Chúa: 0 | Bully: 0
    </div>

    <button class="btn-collect" id="collectBtn" onclick="startCollecting()">
        ĐI LẤY MẬT (Chờ 3s)
        <div class="cooldown-bar" id="cdBar"></div>
    </button>
    
    <button class="btn-sell" onclick="sellHoney()">BÁN MẬT (-30% Lạm phát)</button>

    <div id="random-display">Sẵn sàng quay ong...</div>
    <button class="btn-random" id="randomBtn" onclick="rollBee()">
        RANDOM ONG (Giá: <span id="rollCost">1000</span>$)
    </button>

    <div class="code-section">
        <input type="text" id="codeInput" placeholder="Nhập mã code...">
        <button class="btn-code btn-random" onclick="redeemCode()">OK</button>
    </div>
    
    <div style="display:flex; gap:5px;">
        <button style="background:#444; font-size:0.8rem;" onclick="saveGame()">Lưu</button>
        <button style="background:#444; font-size:0.8rem;" onclick="resetGame()">Reset</button>
    </div>
</div>

<script>
    let game = {
        honey: 0,
        money: 0,
        rollCost: 1000,
        bees: { worker: 0, fighter: 0, queen: 0, bully: 0 },
        isCollecting: false,
        humanAttacking: false,
        isFighting: false,
        lastSave: Date.now()
    };

    const BEE_TYPES = [
        { name: "Ong Thợ", rate: 57, key: 'worker', power: 1 },
        { name: "Ong Chiến Đấu", rate: 20, key: 'fighter', power: 5 },
        { name: "Ong Chúa", rate: 13, key: 'queen', power: 20 },
        { name: "Ong Bully", rate: 10, key: 'bully', power: 12 }
    ];

    function updateUI() {
        document.getElementById('honey').innerText = Math.floor(game.honey);
        document.getElementById('money').innerText = Math.floor(game.money);
        
        let total = game.bees.worker + game.bees.fighter + game.bees.queen + game.bees.bully;
        document.getElementById('totalBees').innerText = total;
        
        // Tính sản lượng (giảm 30% lạm phát)
        let production = (game.bees.worker * 1 + game.bees.queen * 5 + game.bees.bully * 2) * 0.7;
        document.getElementById('hps').innerText = production.toFixed(1);

        document.getElementById('beeDetails').innerText = 
            `Thợ: ${game.bees.worker} | Chiến: ${game.bees.fighter} | Chúa: ${game.bees.queen} | Bully: ${game.bees.bully}`;
        
        document.getElementById('rollCost').innerText = Math.floor(game.rollCost);
        document.getElementById('randomBtn').disabled = game.money < game.rollCost || game.isFighting;
        document.getElementById('collectBtn').disabled = game.isCollecting || game.isFighting;
    }

    // 1. Đi lấy mật chờ 3s
    function startCollecting() {
        if (game.isCollecting) return;
        game.isCollecting = true;
        let btn = document.getElementById('collectBtn');
        let bar = document.getElementById('cdBar');
        
        bar.style.transition = "none";
        bar.style.width = "0%";
        
        setTimeout(() => {
            bar.style.transition = "width 3s linear";
            bar.style.width = "100%";
        }, 10);

        setTimeout(() => {
            game.honey += 10 + (game.bees.worker * 2);
            game.isCollecting = false;
            bar.style.width = "0%";
            updateUI();
        }, 3000);
    }

    function sellHoney() {
        // Giảm 30% tiền nhận được do lạm phát
        let income = (game.honey * 0.5) * 0.7;
        game.money += income;
        game.honey = 0;
        updateUI();
    }

    // 5. Random Ong với hiệu ứng
    function rollBee() {
        if (game.money < game.rollCost) return;
        
        game.money -= game.rollCost;
        game.rollCost *= 1.5; // Tăng 50% mỗi lần mua
        
        let display = document.getElementById('random-display');
        display.classList.add('spinning');
        document.getElementById('randomBtn').disabled = true;

        let counter = 0;
        let interval = setInterval(() => {
            display.innerText = BEE_TYPES[Math.floor(Math.random() * BEE_TYPES.length)].name;
            counter++;
            if (counter > 20) {
                clearInterval(interval);
                display.classList.remove('spinning');
                finishRoll();
            }
        }, 50);
    }

    function finishRoll() {
        let rand = Math.random() * 100;
        let cumulative = 0;
        let selectedBee = BEE_TYPES[0];

        for (let bee of BEE_TYPES) {
            cumulative += bee.rate;
            if (rand <= cumulative) {
                selectedBee = bee;
                break;
            }
        }

        game.bees[selectedBee.key]++;
        document.getElementById('random-display').innerText = "Chúc mừng: " + selectedBee.name + "!";
        updateUI();
    }

    // 7. Phản công con người
    function fightHuman() {
        if (!game.humanAttacking || game.isFighting) return;
        
        game.isFighting = true;
        let timer = 4;
        let btn = document.getElementById('attackBtn');
        
        let countdown = setInterval(() => {
            timer--;
            document.getElementById('battle-timer').innerText = `Đang tấn công... ${timer}s`;
            if (timer <= 0) {
                clearInterval(countdown);
                resolveBattle();
            }
        }, 1000);
    }

    function resolveBattle() {
        game.isFighting = false;
        document.getElementById('battle-timer').innerText = "";
        
        // Tỷ lệ thắng 30%
        if (Math.random() < 0.3) {
            game.humanAttacking = false;
            let reward = game.bees.fighter * 500 + 200;
            game.money += reward;
            alert("BẠN ĐÃ THẮNG! Nhận được " + Math.floor(reward) + "$");
            document.getElementById('battle-zone').style.display = 'none';
        } else {
            alert("Thất bại! Con người quá mạnh, hãy mua thêm Ong Chiến Đấu.");
        }
        updateUI();
    }

    // 8. Hệ thống Code
    function redeemCode() {
        let code = document.getElementById('codeInput').value.toLowerCase();
        if (code === "ong67") {
            game.bees.fighter += 2;
            alert("Code thành công: +2 Ong Chiến Đấu");
        } else if (code === "ezgame") {
            game.bees.worker += 2;
            alert("Code thành công: +2 Ong Thợ");
        } else {
            alert("Mã sai!");
        }
        document.getElementById('codeInput').value = "";
        updateUI();
    }

    // Vòng lặp logic (Mỗi giây)
    let penaltyCounter = 0;
    setInterval(() => {
        // Tự sản xuất mật (Chỉ khi không bị tấn công hoặc có Ong Chúa)
        if (!game.humanAttacking || game.bees.queen > 0) {
            let production = (game.bees.worker * 0.5 + game.bees.queen * 3 + game.bees.bully * 1.5) * 0.7;
            game.honey += production;
        }

        // Xử lý tấn công của con người
        if (game.humanAttacking && !game.isFighting) {
            // 3. Trừ 5 mật mỗi giây
            game.honey = Math.max(0, game.honey - 5);
            
            // Trừ 1 ong mỗi 3 giây
            penaltyCounter++;
            if (penaltyCounter >= 3) {
                let keys = Object.keys(game.bees);
                for(let k of keys) {
                    if(game.bees[k] > 0) {
                        game.bees[k]--;
                        break;
                    }
                }
                penaltyCounter = 0;
            }
        }

        // Tỷ lệ xuất hiện con người (Chỉ khi có ong và KHÔNG có ong chúa đang làm việc)
        // 2. Khi có ong chúa, con người không tấn công (tỷ lệ 0%)
        if (!game.humanAttacking && game.bees.worker > 0 && game.bees.queen === 0) {
            if (Math.random() < 0.05) { // 5% mỗi giây
                game.humanAttacking = true;
                document.getElementById('battle-zone').style.display = 'block';
            }
        }

        updateUI();
    }, 1000);

    // Lưu/Tải game
    function saveGame() {
        localStorage.setItem("bee_war_v11", JSON.stringify(game));
        alert("Đã lưu dữ liệu!");
    }

    function resetGame() {
        if(confirm("Bạn có muốn xóa hết chơi lại từ đầu không?")) {
            localStorage.removeItem("bee_war_v11");
            location.reload();
        }
    }

    window.onload = () => {
        let saved = JSON.parse(localStorage.getItem("bee_war_v11"));
        if (saved) {
            game = {...game, ...saved};
            // Đảm bảo các thuộc tính mới tồn tại
            if(!game.bees) game.bees = { worker: 0, fighter: 0, queen: 0, bully: 0 };
        }
        updateUI();
    }
</script>

</body>
    </html>
