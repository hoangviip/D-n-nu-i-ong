<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobotomy Corp Idle</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-color: #1a1f26;
            --accent-color: #4facfe;
            --text-color: #e0e0e0;
            --danger-color: #ff4b2b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: #000;
            width: 100%;
            padding: 10px 0;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
        }

        .game-container {
            display: flex;
            width: 95%;
            max-width: 1200px;
            height: 80vh;
            margin-top: 20px;
            gap: 20px;
        }

        .panel {
            background: var(--panel-color);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 5px;
            overflow-y: auto;
        }

        /* Thống kê */
        #stats-panel { flex: 1; }
        .stat-box { font-size: 1.2em; margin-bottom: 10px; color: #00ffcc; }

        /* Khu vực làm việc */
        #work-panel { flex: 2; display: flex; flex-direction: column; gap: 15px; }
        .abnormality-card {
            background: #252a33;
            padding: 15px;
            border-left: 5px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Nâng cấp */
        #shop-panel { flex: 1; }

        button {
            background: #333;
            color: white;
            border: 1px solid var(--accent-color);
            padding: 8px 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover:not(:disabled) {
            background: var(--accent-color);
            color: black;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #111;
            margin-top: 5px;
            border-radius: 5px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.1s linear;
        }

        h3 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <h1>LOBOTOMY CORP IDLE</h1>
</header>

<div class="game-container">
    <div id="stats-panel" class="panel">
        <h3>Quản lý Năng lượng</h3>
        <div class="stat-box">PE Boxes: <span id="pe-count">0</span></div>
        <div class="stat-box">Nhân viên: <span id="staff-count">1</span></div>
        <div style="font-size: 0.9em; color: #888;">
            Tự động tạo: <span id="auto-rate">0</span> PE/giây
        </div>
    </div>

    <div id="work-panel" class="panel">
        <h3>Phòng Chứa Dị Thể</h3>
        <div id="abnormality-list">
            <div class="abnormality-card">
                <div>
                    <strong>Một ngày nọ (ZAYIN)</strong><br>
                    <small>Công việc: Bản năng</small>
                    <div class="progress-bar"><div id="bar-0" class="progress-fill"></div></div>
                </div>
                <button onclick="work(0)">Làm việc</button>
            </div>
        </div>
    </div>

    <div id="shop-panel" class="panel">
        <h3>Văn phòng Cải tiến</h3>
        <button onclick="hireStaff()" id="btn-staff">Thuê nhân viên (10 PE)</button>
        <hr>
        <button onclick="unlockAbnormality()" id="btn-unlock">Mở khóa Dị thể mới (50 PE)</button>
        <hr>
        <button onclick="upgradeEgo()" id="btn-ego">Nâng cấp E.G.O (100 PE)</button>
    </div>
</div>

<script>
    // Dữ liệu Game
    let gameState = {
        peBoxes: 0,
        staff: 1,
        egoLevel: 1,
        unlockedCount: 1
    };

    const abnormalities = [
        { name: "Một ngày nọ", rank: "ZAYIN", reward: 1, speed: 2000 },
        { name: "Cỗ máy ca hát", rank: "HE", reward: 5, speed: 4000 },
        { name: "Chú bé rụt rè", rank: "TETH", reward: 12, speed: 6000 },
        { name: "Xác chết trôi", rank: "WAW", reward: 30, speed: 10000 },
        { name: "Không có gì", rank: "ALEPH", reward: 100, speed: 20000 }
    ];

    // Hàm cập nhật giao diện
    function updateUI() {
        document.getElementById('pe-count').innerText = Math.floor(gameState.peBoxes);
        document.getElementById('staff-count').innerText = gameState.staff;
        
        let rate = (gameState.staff - 1) * 0.5;
        document.getElementById('auto-rate').innerText = rate.toFixed(1);

        // Cập nhật trạng thái nút bấm
        document.getElementById('btn-staff').disabled = gameState.peBoxes < 10 * gameState.staff;
        document.getElementById('btn-unlock').disabled = gameState.peBoxes < 50 * gameState.unlockedCount || gameState.unlockedCount >= abnormalities.length;
        document.getElementById('btn-ego').disabled = gameState.peBoxes < 100 * gameState.egoLevel;
    }

    // Hàm làm việc thủ công
    function work(index) {
        const bar = document.getElementById(`bar-${index}`);
        const btn = event.target;
        btn.disabled = true;

        let start = null;
        const duration = abnormalities[index].speed / gameState.egoLevel;

        function animate(timestamp) {
            if (!start) start = timestamp;
            let progress = timestamp - start;
            let percent = Math.min((progress / duration) * 100, 100);
            bar.style.width = percent + "%";

            if (progress < duration) {
                requestAnimationFrame(animate);
            } else {
                gameState.peBoxes += abnormalities[index].reward;
                bar.style.width = "0%";
                btn.disabled = false;
                updateUI();
            }
        }
        requestAnimationFrame(animate);
    }

    // Thuê nhân viên (Tạo PE Box tự động)
    function hireStaff() {
        let cost = 10 * gameState.staff;
        if (gameState.peBoxes >= cost) {
            gameState.peBoxes -= cost;
            gameState.staff++;
            updateUI();
        }
    }

    // Mở khóa dị thể mới
    function unlockAbnormality() {
        let cost = 50 * gameState.unlockedCount;
        if (gameState.peBoxes >= cost && gameState.unlockedCount < abnormalities.length) {
            gameState.peBoxes -= cost;
            const data = abnormalities[gameState.unlockedCount];
            const html = `
                <div class="abnormality-card">
                    <div>
                        <strong>${data.name} (${data.rank})</strong><br>
                        <small>Công việc: Thấu hiểu</small>
                        <div class="progress-bar"><div id="bar-${gameState.unlockedCount}" class="progress-fill"></div></div>
                    </div>
                    <button onclick="work(${gameState.unlockedCount})">Làm việc</button>
                </div>
            `;
            document.getElementById('abnormality-list').innerHTML += html;
            gameState.unlockedCount++;
            updateUI();
        }
    }

    // Nâng cấp E.G.O (Tăng tốc độ làm việc)
    function upgradeEgo() {
        let cost = 100 * gameState.egoLevel;
        if (gameState.peBoxes >= cost) {
            gameState.peBoxes -= cost;
            gameState.egoLevel += 0.5;
            updateUI();
        }
    }

    // Vòng lặp Idle (0.5 PE mỗi giây cho mỗi nhân viên thêm)
    setInterval(() => {
        if (gameState.staff > 1) {
            gameState.peBoxes += (gameState.staff - 1) * 0.1; // Chạy mỗi 100ms
            updateUI();
        }
    }, 100);

    // Khởi tạo
    updateUI();
</script>

</body>
</html>
